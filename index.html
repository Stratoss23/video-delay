<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#07080b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Video Delay">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Video Delay</title>
    <link rel="manifest" href="./manifest.webmanifest?v=21">
    <link rel="stylesheet" href="./style.css?v=21">
  </head>
  <body>
    <main class="app">
      <video id="sourceVideo" playsinline muted></video>
      <canvas id="delayCanvas"></canvas>
      <canvas id="drawCanvas" aria-label="Kreslenie pomocnych ciar"></canvas>

      <section id="permissionPanel" class="panel">
        <img class="startLogo" src="https://www.lukostrelbatopolcany.sk/wp-content/uploads/2025/11/logo_love_transparent.png" alt="Lukostrelba Topolcany">
        <h1>Video Delay</h1>
        <p>Oneskoreny obraz z kamery pre iPad.</p>
        <button id="startButton" class="primary">Spustit kameru</button>
        <p id="statusText" class="status">Safari sa opyta na povolenie kamery.</p>
      </section>

      <div class="topbar">
        <div class="brandGroup">
          <img class="brandLogo" src="https://www.lukostrelbatopolcany.sk/wp-content/uploads/2025/11/logo_love_transparent.png" alt="Lukostrelba Topolcany">
          <div class="badge" id="cameraLabel">Kamera</div>
        </div>
        <div class="drawTools" aria-label="Kreslenie">
          <button id="drawButton" title="Kreslit rovnu ciaru">Draw</button>
          <button id="drawModeButton" title="Rezim kreslenia">Line</button>
          <button id="colorButton" title="Farba ciary">Yellow</button>
          <button id="undoDrawButton" title="Zrusit poslednu ciaru">Undo</button>
          <button id="clearDrawButton" title="Vymazat ciary">Clear</button>
        </div>
        <div class="badge" id="bufferLabel">Buffer 0 s</div>
      </div>

      <section class="controls" aria-label="Ovladanie">
        <button id="cameraButton" title="Prepnut kameru">Cam</button>
        <button id="mirrorButton" title="Zrkadlenie">Mir</button>
        <button id="pauseButton" title="Pauza">Pause</button>
        <button id="playBufferButton" title="Prehrat od frame">Play</button>
        <button id="speedButton" title="Rychlost prehravania">1x</button>

        <label class="frameControl">
          <span id="frameLabel">Frame --</span>
          <input id="frameSlider" type="range" min="0" max="0" step="1" value="0" disabled>
        </label>

        <label class="delayControl">
          <span id="delayLabel">Delay 3 s</span>
          <input id="delaySlider" type="range" min="0" max="5" step="1" value="3">
        </label>

        <button id="fitButton" title="Vyplnit obraz">Fit</button>
        <button id="fullscreenButton" title="Cela obrazovka">Full</button>
      </section>
    </main>

    <script src="./app.js?v=21"></script>
  </body>
</html>
